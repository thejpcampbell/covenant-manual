<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP & Ashley — Covenant Restoration</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#2D8EFF;
  --blue-bright:#4FA3FF;
  --blue-dim:#1A5FAA;
  --blue-pale:#050D1A;
  --navy:#0A1628;
  --navy-2:#0D1E35;
  --navy-3:#112445;
  --midnight:#060A10;
  --midnight-2:#080D16;
  --midnight-3:#0C1220;
  --text:#F4F8FF;
  --text-body:#C0CFEA;
  --text-muted:#5A7099;
  --border:#1A2A42;
  --border-bright:#243A5C;
  --his:#2D8EFF;
  --hers:#7B9ED9;
}
body{background:var(--midnight);color:var(--text);font-family:'Barlow',sans-serif;font-weight:400;line-height:1.8;min-height:100vh;font-size:16px;}

/* COVER */
.cover{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;text-align:center;background:radial-gradient(ellipse at 50% 50%, #0A1628 0%, #060A10 70%);}
.cover h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.6rem,7vw,4.6rem);font-weight:600;color:var(--text);line-height:1.1;margin-bottom:0.75rem;}
.cover h1 em{color:var(--blue-bright);font-style:italic;}
.cover-rule{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);margin:1.75rem auto;}
.cover-sub{font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--text-muted);margin-bottom:2.5rem;}
.cover-verse{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:var(--text-body);max-width:440px;margin:0 auto 2.75rem;border-left:2px solid var(--blue);padding-left:1.5rem;text-align:left;line-height:1.9;}
.cover-verse cite{display:block;font-style:normal;font-size:11px;font-family:'Barlow',sans-serif;color:var(--blue-bright);margin-top:10px;letter-spacing:0.15em;}
.start-btn{background:transparent;border:1px solid var(--blue);color:var(--blue-bright);font-family:'Barlow',sans-serif;font-size:12px;letter-spacing:0.22em;text-transform:uppercase;padding:15px 52px;cursor:pointer;transition:all 0.25s;}
.start-btn:hover{background:var(--blue);color:var(--midnight);letter-spacing:0.28em;}

/* APP */
.app{display:none;max-width:860px;margin:0 auto;padding:2rem 1.75rem 5rem;}
.top-nav{display:flex;gap:2px;margin-bottom:2.5rem;border-bottom:1px solid var(--border);overflow-x:auto;}
.tnb{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-muted);font-family:'Barlow',sans-serif;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;padding:12px 16px;cursor:pointer;white-space:nowrap;margin-bottom:-1px;transition:all 0.15s;font-weight:400;}
.tnb.active{color:var(--blue-bright);border-bottom-color:var(--blue);}
.tnb:hover:not(.active){color:var(--text);}
.panel{display:none;}.panel.active{display:block;}

/* TYPOGRAPHY */
.sec-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.15;}
.sec-sub{font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--blue);margin-bottom:2rem;}
.body-text{font-size:15px;color:var(--text-body);line-height:1.9;margin-bottom:1.75rem;}
.divider{border:none;border-top:1px solid var(--border);margin:2.25rem 0;}
.gold-rule{width:50px;height:1px;background:linear-gradient(90deg,var(--blue),transparent);margin:1.75rem 0;}

/* CARDS */
.pcard{background:var(--navy);border:1px solid var(--border);border-left:3px solid var(--blue);padding:1.75rem;margin-bottom:1.25rem;}
.pcard h3{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--text);margin-bottom:6px;line-height:1.2;}
.pcard .vref{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--blue-bright);margin-bottom:12px;font-weight:500;}
.pcard p{font-size:15px;color:var(--text-body);line-height:1.9;}

/* SCRIPTURE */
.scripture-block{background:var(--navy-2);border-left:3px solid var(--blue-bright);padding:1.4rem 1.6rem;margin:1.25rem 0;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:21px;color:var(--text);line-height:1.85;}
.scripture-block cite{display:block;font-style:normal;font-size:11px;font-family:'Barlow',sans-serif;color:var(--blue-bright);margin-top:10px;letter-spacing:0.14em;font-weight:500;}

/* WEEK GRID */
.week-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2.25rem;}
.wk-btn{background:var(--midnight-2);border:1px solid var(--border);padding:14px 10px;text-align:center;cursor:pointer;transition:all 0.15s;}
.wk-btn:hover{border-color:var(--blue-dim);background:var(--navy);}
.wk-btn.active{border-color:var(--blue);background:var(--blue-pale);}
.wk-btn.done{border-color:var(--blue-dim);opacity:0.6;}
.wk-num{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--blue-bright);margin-bottom:4px;font-weight:500;}
.wk-name{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--text);line-height:1.2;}
.wk-check{font-size:11px;color:var(--blue-bright);margin-top:4px;}

/* DAY TABS */
.day-tabs{display:flex;gap:10px;margin-bottom:1.75rem;}
.day-tab{flex:1;background:var(--midnight-2);border:1px solid var(--border);padding:14px;text-align:center;cursor:pointer;transition:all 0.15s;}
.day-tab:hover{border-color:var(--blue-dim);background:var(--navy);}
.day-tab.active{border-color:var(--blue);background:var(--blue-pale);}
.day-tab-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--blue-bright);font-weight:500;}
.day-tab-name{font-size:14px;color:var(--text);margin-top:4px;font-weight:400;}
.day-tab.sun{opacity:0.3;cursor:default;}
.day-tab.sun:hover{border-color:var(--border);background:var(--midnight-2);}

/* LESSON */
.ls{margin-bottom:2rem;}
.ls-label{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--blue-bright);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border-bright);font-weight:500;}
.ls-body{font-size:15px;color:var(--text-body);line-height:1.95;}

/* REFLECTION */
.reflection-row{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-top:1.25rem;}
.ref-box{background:var(--navy-2);border:1px solid var(--border);padding:1.5rem;}
.ref-box-label{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:10px;font-weight:500;}
.ref-box.his{border-top:2px solid var(--his);}
.ref-box.his .ref-box-label{color:var(--his);}
.ref-box.hers{border-top:2px solid var(--hers);}
.ref-box.hers .ref-box-label{color:var(--hers);}
.ref-box p{font-size:14px;color:var(--text-body);font-style:italic;line-height:1.8;}

/* BUTTONS */
.complete-btn{background:transparent;border:1px solid var(--blue);color:var(--blue-bright);font-family:'Barlow',sans-serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;padding:13px 32px;cursor:pointer;transition:all 0.2s;margin-top:2.25rem;display:inline-block;}
.complete-btn:hover{background:var(--blue);color:var(--midnight);}
.complete-btn.done{opacity:0.4;cursor:default;}

/* PROGRESS */
.progress-wrap{margin-bottom:2.25rem;}
.progress-top{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:8px;}
.progress-bar{height:3px;background:var(--midnight-3);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue-dim),var(--blue-bright));transition:width 0.5s;}

/* STANDARDS */
.std-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.75rem;}
.std-col{background:var(--navy);border:1px solid var(--border);padding:1.5rem;}
.std-col.his{border-top:2px solid var(--his);}
.std-col.hers{border-top:2px solid var(--hers);}
.std-col h4{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:1rem;padding-bottom:10px;border-bottom:1px solid var(--border);font-weight:500;}
.std-col.his h4{color:var(--his);}
.std-col.hers h4{color:var(--hers);}
.std-col ul{list-style:none;padding:0;}
.std-col ul li{font-size:14px;color:var(--text-body);padding:7px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;line-height:1.65;}
.std-col ul li::before{content:'—';color:var(--blue-dim);flex-shrink:0;}

/* COMMITMENTS */
.commit-card{background:var(--navy);border:1px solid var(--border);padding:1.75rem;margin-bottom:1.25rem;}
.commit-card h3{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--text);margin-bottom:1.25rem;padding-bottom:10px;border-bottom:1px solid var(--border-bright);}
.chk-row{display:flex;align-items:flex-start;gap:14px;padding:10px 0;border-bottom:1px solid var(--border);}
.chk-row:last-child{border-bottom:none;}
.chk-row input{width:16px;height:16px;margin-top:4px;accent-color:var(--blue-bright);flex-shrink:0;cursor:pointer;}
.chk-row label{font-size:14px;color:var(--text-body);cursor:pointer;line-height:1.75;}

/* SEAL */
.seal{text-align:center;padding:3.5rem 1rem;border-top:1px solid var(--border);margin-top:2.5rem;}
.seal p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:25px;color:var(--text-body);max-width:520px;margin:0 auto 10px;line-height:1.5;}
.seal cite{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--blue-bright);font-style:normal;font-family:'Barlow',sans-serif;font-weight:500;}

@media(max-width:600px){
  .week-grid{grid-template-columns:repeat(2,1fr);}
  .std-grid,.reflection-row{grid-template-columns:1fr;}
  .day-tab-name{font-size:12px;}
  .app{padding:1.5rem 1rem 4rem;}
}
</style>
</head>
<body>

<div class="cover" id="cover">
  <div>
    <div style="font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem;">JP & Ashley</div>
    <h1>Covenant<br><em>Restoration</em><br>Manual</h1>
    <div class="cover-rule"></div>
    <p class="cover-sub">Eight Weeks · Monday · Wednesday · Friday · Church Sunday</p>
    <div class="cover-verse">
      Though one may be overpowered, two can defend themselves. A cord of three strands is not quickly broken.
      <cite>Ecclesiastes 4:12</cite>
    </div>
    <button class="start-btn" onclick="startApp()">Enter the Manual</button>
  </div>
</div>

<div class="app" id="app"></div>

<script>
const WEEKS = [
  {
    name:"Surrender",
    theme:"Before this marriage can be rebuilt, both of you have to kneel — separately and together",
    mon:{
      title:"What Surrender Actually Costs",
      scripture:{text:"Trust in the Lord with all your heart and lean not on your own understanding; in all your ways submit to him, and he will make your paths straight.",ref:"Proverbs 3:5-6"},
      study:`JP — you have spent a year and a half learning what surrender looks like. Easter Sunday was the moment you stopped negotiating with God and started obeying him. You know what that cost. You know what it felt like to lay down the drinking, to lay down the version of yourself that justified cheating, to lay down the anger that had become your default response to feeling unheard. That process was not painless and it was not fast. But it changed you in ways that are visible.\n\nAshley — surrender has not happened yet at that depth. And this is not an accusation. It is a diagnosis. The evidence is not JP's opinion of you. The evidence is in the pattern: the contempt that comes out sideways, the inability to release past offenses even when they have been repented of, the resistance to spiritual engagement, the use of trauma as a reason to stay stuck rather than a wound to be healed. None of that is who God designed you to be. All of it is what happens when a person carries weight that was meant to be given to God.\n\nProverbs 3:5 uses the Hebrew word batach for trust — it means to lean your full weight on something. Not touch it carefully. Not approach it cautiously. Lean on it completely. Both of you are being asked to lean your full weight on God in this process — not on each other, not on your own understanding of who was more wrong. On God.`,
      exercise:"Both of you sit separately for 20 minutes before this session. JP — write down what you were before Easter Sunday and who you are now. The specific things God has changed in you. Ashley — write down the three things you are most afraid to surrender to God. Not to JP. To God. Bring both to the session and read them to each other without interruption.",
      his:"JP — where are you still trying to control the outcome of this marriage in your own strength rather than trusting God with it?",
      hers:"Ashley — what is the specific fear underneath your resistance to surrender? Name it. Not the behavior — the fear driving it."
    },
    wed:{
      title:"Mutual Submission — What It Actually Means",
      scripture:{text:"Submit to one another out of reverence for Christ.",ref:"Ephesians 5:21"},
      study:`Ephesians 5:21 is the verse that comes before the famous husband and wife instructions. Most people start reading at verse 22 and miss the foundation entirely. Paul commands mutual submission first — to one another, out of reverence for Christ. This means the posture of both people in this covenant is one of yielding. Not to each other's moods or demands. To Christ's design, expressed through the roles he has assigned.\n\nJP — your role as head of this household is defined by how Christ leads the church. Christ loved the church while it was broken, faithless, and actively failing him. He did not lead by demanding compliance. He led by laying his life down. The authority you carry as head of this house is given to you in order to enable sacrifice — not to enforce submission.\n\nAshley — the submission scripture asks of you is not to a man. It is to God's design, expressed through a man who is submitted to God himself. The word hupotasso in Greek means to voluntarily place yourself under. It is a military term — a soldier choosing to operate under a commanding officer's authority because they trust the chain of command. Your submission is ultimately to God. JP's faithfulness to God is what makes that safe.\n\nThe breakdown in this marriage has come partly because JP has not always led the way Christ leads — the anger and the cheating were failures of leadership. And partly because Ashley has used those failures as permanent justification for refusing the design entirely. Both of those patterns have to end here.`,
      exercise:"Together, read Ephesians 5:21-33 out loud — alternate verses. After you finish, both people answer this: where have I failed to operate in my role this week — not the other person's role, my own? Write it down. Share it. No rebuttals.",
      his:"JP — have you ever demanded Ashley's submission to leadership that was not submitted to God? Be specific and own it without explanation.",
      hers:"Ashley — can you identify the difference between resisting JP's leadership because it has been genuinely untrustworthy versus resisting it because the wounds from the past make submission feel unsafe regardless of who is leading?"
    },
    fri:{
      title:"The Posture That Carries Everything Else",
      scripture:{text:"Humble yourselves before the Lord, and he will lift you up.",ref:"James 4:10"},
      study:`James 4 is written to people in conflict — people fighting because they want things they are not getting. The diagnosis is unsubmitted desire. You want something. You do not have it. You fight for it. JP wants to be seen as changed. Ashley wants to feel safe. Both of those desires are legitimate. Neither of them is being met through the current approach.\n\nJames says the solution is not better communication or better strategy. It is humility before God. Humility is not self-deprecation — it is accurate self-assessment. JP — you are a changed man but you are not a finished man. The anger that broke that door has not been fully submitted. Ashley — you are a wounded woman but you are not a helpless one. The contempt pattern is a choice, even when it does not feel like one.\n\nHumility from both of you sounds like this: I do not have this figured out. My perspective is partial. I am going to stop insisting on my version of fair and start asking God what faithfulness looks like from me today.`,
      exercise:"Together, write one sentence that becomes the posture statement for this entire process. It starts with 'We choose...' and it describes what both of you are committing to — not what the other person needs to do. Write it on paper. Put it somewhere both of you see it every day for the next eight weeks.",
      his:"JP — what does the humbled version of you look like in a conflict with Ashley? Describe him specifically.",
      hers:"Ashley — what does humility feel like in your body when you are actually operating from it versus defensiveness? How do you get back there when you have drifted?"
    }
  },
  {
    name:"The Wounds",
    theme:"Naming what actually happened — JP's failures, Ashley's wounds, and the pattern that grew from both",
    mon:{
      title:"JP's Failures — Named Directly",
      scripture:{text:"If we confess our sins, he is faithful and just and will forgive us our sins and purify us from all unrighteousness.",ref:"1 John 1:9"},
      study:`This session is written directly to JP first because the wounds in this marriage began with his failures. That is the truth and it needs to be named without softening before anything else can be built.\n\nJP — you cheated. That was a covenant violation of the highest order. Whatever the conditions were, whatever was unresolved in you, whatever she was or was not doing — you made a choice that broke the sacred trust of this marriage. Proverbs 6:32 says the man who commits adultery has no sense — he destroys himself. That is not condemnation. It is diagnosis. The cheating was a symptom of a man who had not yet surrendered to God, who was filling emptiness with sin instead of with the Lord.\n\nYou drank in ways that crossed lines. The drinking itself is not the sin — scripture permits wine. But drinking that produced instability, that Ashley experienced as a return to old patterns, that became a point of legitimate concern — that was real and it needs to be acknowledged as something that affected her, not defended as your right.\n\nYou have expressed anger physically — breaking a door, yelling in ways that made Ashley say she felt unsafe. Proverbs 16:32 says he who is slow to anger is better than the mighty and he who rules his spirit than he who takes a city. You have been building that man. That door was the old man showing up. That needs to be owned completely.\n\nAnd here is the critical truth: all three of these things have been repented of. You have changed. The man who made those choices is not fully the man sitting here today. 2 Corinthians 5:17 — if anyone is in Christ he is a new creation. The old has gone. The new has come. That is real. God holds you as forgiven. The question is whether Ashley has been able to receive that — and whether you have given her enough evidence over enough time for that to be reasonable.`,
      exercise:"JP — write a full accounting of each failure without explanation or context. Not a confession with qualifiers. Just the truth of what you did and what it cost her. Ashley — read it silently. Do not respond yet. Sit with it for 24 hours before Wednesday.",
      his:"JP — have you fully owned each of these three failures or have you consistently explained them in terms of what led to them? There is a difference between context and accountability. Which have you been offering?",
      hers:"Ashley — which of these three wounds is the deepest for you right now? Not the loudest one — the deepest one that you have never fully let JP see the weight of?"
    },
    wed:{
      title:"Ashley's Response — What the Wounds Produced",
      scripture:{text:"See to it that no one falls short of the grace of God and that no bitter root grows up to cause trouble and defile many.",ref:"Hebrews 12:15"},
      study:`Ashley — this session is for you. Not to minimize what JP did. What he did was real and the wounds it produced are real. But Hebrews 12:15 describes what happens when legitimate wounds are not brought to God for healing — they become bitter roots that grow underground and eventually defile everything around them.\n\nThe contempt pattern — the days of silence, the cold shutdown, the weaponizing of past offenses in the middle of conversations about current ones — that is a bitter root that grew from real wounds. You were hurt. You did not fully heal. And the unhealed wound became a weapon, and the weapon became a pattern, and the pattern became the culture of this home.\n\nThe trauma is real. The use of it as a permanent crutch is a choice. Those are two different things and they need to be separated. JP's cheating wounded you. JP's drinking scared you. JP's anger made you feel unsafe. All of that is true. And you have the right to name it, feel it, and have it taken seriously.\n\nWhat you do not have the right to do — scripturally or in this covenant — is hold it as a permanent debt that JP can never fully pay. 1 Corinthians 13:5 says love keeps no record of wrongs. Proverbs 17:9 says whoever repeats a covered matter separates close friends. The repeated returning to what has been repented of is not protecting you. It is keeping you stuck and it is slowly destroying what could still be rebuilt.`,
      exercise:"Ashley — write a full honest accounting of the patterns you have developed in response to the wounds. The shutdown. The contempt. The weaponizing. Not as justification — as honest inventory. JP — read it silently. Do not respond. Sit with it.",
      his:"JP — can you receive Ashley's wound without immediately defending your change? Can you hold the reality that she is still in pain without making her pain about your progress?",
      hers:"Ashley — what would it feel like to bring the deepest wound to God rather than holding it as evidence against JP? Not to excuse what he did — to release the weight of carrying it."
    },
    fri:{
      title:"The Pattern That Grew From Both",
      scripture:{text:"For our struggle is not against flesh and blood, but against the rulers, against the authorities, against the powers of this dark world.",ref:"Ephesians 6:12"},
      study:`Ephesians 6:12 reframes the conflict entirely. The enemy of this marriage is not JP. It is not Ashley. It is the spiritual forces that have used real wounds, real failures, and real pain to build walls between two people who chose each other.\n\nHere is the pattern that has developed: JP fails. Ashley wounds. JP repents and changes. Ashley cannot fully release the wound. JP grows frustrated at being held to a past he has left behind. JP escalates. Ashley uses the escalation as new evidence. JP feels prosecuted for both old and new offenses simultaneously. The cycle tightens.\n\nJohn 10:10 — the thief comes to steal, kill, and destroy. This cycle is the theft. It has stolen peace from this home, killed the trust between you, and is actively destroying what God joined together. Both of you have fed this cycle. JP with the original failures and the reactive anger. Ashley with the refusal to release what has been repented of.\n\nNaming the pattern is the first step to breaking it. You cannot fight what you cannot see.`,
      exercise:"Together — draw the cycle on paper. Literally map it: what JP does, what Ashley feels, what Ashley does, what JP feels, what JP does. See it visually. Then pray over it together — out loud — naming the enemy and declaring that this cycle ends here.",
      his:"JP — where in the cycle do you have the most power to break it? Not what Ashley should do differently — where can you interrupt it yourself?",
      hers:"Ashley — where in the cycle do you have the most power to break it? What would it look like to respond differently at your point of entry?"
    }
  },
  {
    name:"Communication",
    theme:"Building a new language — specific to how JP and Ashley actually break down",
    mon:{
      title:"The JP and Ashley Breakdown Pattern",
      scripture:{text:"Let every person be quick to hear, slow to speak, slow to anger.",ref:"James 1:19"},
      study:`James 1:19 is a three-part prescription that is the exact inversion of how this marriage currently communicates under pressure.\n\nJP — you are slow to hear and quick to speak when you feel unheard long enough. The escalation to yelling and physical expressions of frustration is the result of months of trying to communicate and hitting a wall. That does not justify the escalation. But it explains the kindling. A man who has been trying to be heard for months and keeps getting shut out eventually breaks. The break is not the solution. But the shutdown that preceded it created the conditions.\n\nAshley — you are slow to speak and that sounds like a virtue until it becomes strategic. The silence, the shutdown, the going cold — these are not processing time. They are a communication style that forces JP to chase, and when he chases long enough and hard enough, the explosion gives you new evidence. The silence is not neutral. It is a form of communication that produces predictable results.\n\nBoth of these patterns need to be named and interrupted. JP needs to learn to stay regulated longer than feels fair. Ashley needs to learn to speak sooner than feels safe.`,
      exercise:"Each person maps their personal pattern honestly. JP — 'When I feel unheard I ____. When I feel accused I ____. When I feel like the past is being used against me I ____.' Ashley — 'When I feel unsafe I ____. When I feel overwhelmed I ____. When I feel like JP is escalating I ____.' Share the maps. Do not defend them — just read them to each other.",
      his:"JP — what is the earliest sign that you are beginning to escalate? What does it feel like in your body before it comes out of your mouth or your hands?",
      hers:"Ashley — what is the earliest sign that you are beginning to shut down? What are you feeling in that moment that you have never said out loud to JP?"
    },
    wed:{
      title:"The Structure That Replaces the Pattern",
      scripture:{text:"Let your speech always be gracious, seasoned with salt, so that you may know how you ought to answer each person.",ref:"Colossians 4:6"},
      study:`Gracious speech is not soft speech. It is honest, substantive speech delivered in a way that serves rather than wounds. The salt metaphor means speech that preserves and adds flavor — truth that the other person can actually receive because of how it is delivered.\n\nThe structured conversation method is not a therapy tool. It is a practical framework that forces both of JP and Ashley's patterns to interrupt themselves. JP cannot escalate if he is operating as the listener who reflects back. Ashley cannot go silent if she is operating as the speaker who names the issue within the structure.\n\nThis is how it works and both of you are going to practice it today:\n\nSPEAKER — speaks for 3 uninterrupted minutes. States the issue, how it made them feel, what they need. No blame language. "I felt _____ when _____. What I need is _____." \n\nLISTENER — reflects back without rebuttal: "What I heard you say is..." Then asks: "Did I get that right?"\n\nSPEAKER — confirms or corrects. Only then does the listener respond.\n\nThis structure prevents JP from interrupting with defense. It prevents Ashley from shutting down because she is the speaker with a defined floor.`,
      exercise:"Practice the structure on a real but low-stakes issue — not the biggest one. After both directions are complete, discuss: what felt different about being heard before being responded to? What was hard about listening without defending?",
      his:"JP — what did it cost you to listen for three minutes without correcting, defending, or problem-solving? What came up internally during that time?",
      hers:"Ashley — what did it feel like to speak with a guaranteed three minutes of being heard? Was it harder or easier than expected and why?"
    },
    fri:{
      title:"The Four Laws — Non-Negotiable for JP and Ashley",
      scripture:{text:"Do not let any unwholesome talk come out of your mouths, but only what is helpful for building others up according to their needs.",ref:"Ephesians 4:29"},
      study:`Ephesians 4:29 sets a standard for every word — does it build up according to the other person's need? This is the biblical standard for speech between JP and Ashley. Every word in every conversation is measured against it.\n\nThese four laws are written specifically for the patterns in this marriage. They are not generic communication advice. They address the specific breakdown points that have repeated.\n\nLaw 1 — The 24-Hour Rule: No issue sits more than 24 hours unnamed. Ashley — this directly addresses the three-day silence pattern. Twenty-four hours maximum. After that the silence is a violation of the covenant, not a processing strategy.\n\nLaw 2 — No Historical Prosecution: The cheating, the drinking, the past anger — if they have been addressed in the context of a current conversation they cannot be reintroduced as ammunition in a new one. They are permanently sealed. Ashley — this one is primarily yours to keep. JP — Law 1 is primarily yours.\n\nLaw 3 — One Issue Per Conversation: Ashley, when JP comes to you for a real conversation about something current, that conversation cannot be redirected to older offenses within five minutes. Stay on the current issue.\n\nLaw 4 — The 15-Minute Pause: JP, this one is for you specifically. When you feel escalation coming — call a pause. Fifteen minutes. Walk, breathe, pray. Return. Do not break anything. Do not raise your voice. Call the pause.`,
      exercise:"Both people say each law out loud and name which one is hardest for them personally. Then both people sign the list — physically, on paper — as an agreement that these govern every difficult conversation going forward.",
      his:"JP — Law 4 is your primary discipline. What specific practice will you put in place to catch yourself before escalation rather than after?",
      hers:"Ashley — Law 1 is your primary discipline. What is the fear that makes naming an issue within 24 hours feel dangerous, and how do you address that fear rather than avoid it?"
    }
  },
  {
    name:"Forgiveness",
    theme:"Closing the accounts — specifically the cheating, the drinking, and the anger",
    mon:{
      title:"What Ashley Is Being Asked to Forgive",
      scripture:{text:"Be kind and compassionate to one another, forgiving each other, just as in Christ God forgave you.",ref:"Ephesians 4:32"},
      study:`This session names the three wounds directly because forgiveness that is general is forgiveness that does not actually happen. You cannot release what you have not named.\n\nThe cheating. Ashley — you were betrayed in the most intimate way a spouse can be betrayed. The covenant promise of sexual exclusivity was broken. That wound is not small. It restructures how you read every interaction — his motives, his absences, his words. The damage from infidelity is not just the act. It is the years of reprocessing every memory through the new information. That is a real and significant wound.\n\nThe drinking. Ashley — whether the drinking was diagnosably problematic or not, it represented something to you. A man who was not fully present. A pattern that reminded you of things you did not feel safe around. A behavior that felt like a threat to the stability you needed. That fear is legitimate even if the behavior itself was not always sinful.\n\nThe anger. Ashley — being yelled at by the man who is supposed to be your covering is a specific kind of wound. The broken door made you say you felt unsafe. That matters. A woman who does not feel physically safe in her home cannot open up emotionally in her home. The anger — even if it was the overflow of months of frustration — broke something.\n\nForgiveness does not mean these things were not that bad. It means you are releasing the debt. Not for JP's sake. For yours. Unforgiveness does not punish the offender — it keeps the victim chained to the wound.`,
      exercise:"Ashley — write each wound at the top of a separate page. Under each one, write every way it has affected you that JP has not fully seen. The full weight. Do not share yet. This is for you and God first.",
      his:"JP — can you sit with the full weight of what these three things did to Ashley without immediately moving to what you have done to change? Just receive it.",
      hers:"Ashley — which of the three wounds has the most active hold on you right now — meaning which one surfaces most often in current conflict?"
    },
    wed:{
      title:"The Mechanics of Biblical Forgiveness",
      scripture:{text:"For as high as the heavens are above the earth, so great is his love for those who fear him; as far as the east is from the west, so far has he removed our transgressions from us.",ref:"Psalm 103:11-12"},
      study:`Psalm 103:11-12 describes how God forgives. As far as east is from west — a direction that never meets itself, unlike north and south which meet at the poles. God's forgiveness is directional and infinite. He does not retrieve the offense. He does not circle back to it when you fail at something new. He does not hold it in reserve.\n\nAshley — the standard you are being asked to meet is not human scale. It is God-scale. And you cannot meet it on your own strength. No person can fully forgive a betrayal like infidelity through willpower alone. This is a supernatural act that requires the Holy Spirit working in a surrendered person.\n\nForgiveness is a decision that precedes the feeling. You choose to release the debt before the feeling of release arrives. The feeling follows the decision — sometimes immediately, sometimes over months. But the decision comes first.\n\nRead Matthew 18:21-35 together — the parable of the unmerciful servant. The servant is forgiven an impossible debt — millions of dollars in today's terms. He then imprisons someone who owes him the equivalent of a few dollars. Jesus does not say the few dollars debt was not real. He says the contrast between what was forgiven and what is being withheld is what makes the unmerciful servant's behavior indefensible.\n\nJP's debt to Ashley is real. God's debt cancellation over JP is also real. Ashley is being asked to extend what she has received from God.`,
      exercise:"Ashley — bring the pages from Monday. In a place of privacy, read each wound out loud to God — not as a complaint but as a release. 'Lord, I am giving you the wound of _____. I am choosing to release the debt. I am not saying it was acceptable. I am saying I will no longer hold the invoice.' Then physically destroy each page.",
      his:"JP — what specific, observable actions have you taken in the last year that demonstrate the change Ashley is being asked to trust? Write them down. Not for your defense — as honest inventory of evidence.",
      hers:"Ashley — after the exercise, what shifted? What is still held? Name what remains honestly — not as failure but as the next thing to bring to God."
    },
    fri:{
      title:"Forgiveness Does Not Mean Trust Is Automatic",
      scripture:{text:"Love keeps no record of wrongs.",ref:"1 Corinthians 13:5"},
      study:`1 Corinthians 13:5 is the commitment Ashley is being asked to make — and it is one of the hardest verses in the entire Bible for someone who has been betrayed. Love keeps no record. The Greek is logizomai — to count, to calculate, to keep an account. Love refuses to keep the ledger.\n\nBut here is what this verse does not say: love ignores ongoing patterns. Love pretends everything is fine. Love absorbs the same behavior indefinitely.\n\nForgiveness covers the past. Accountability addresses the present. These are not in conflict. Ashley can forgive the cheating completely — release it as a debt — and still hold JP accountable to ongoing faithfulness. Ashley can forgive the drinking — release it as a wound — and still name it if a current behavior crosses a line. Ashley can forgive the anger — release it — and still name it immediately if it surfaces again.\n\nThe difference is this: a forgiven offense cannot be retrieved and used as ammunition in a new conflict. It can inform what accountability looks like going forward. JP — you have released her from having to carry these wounds forever. You have not released her from the right to hold you to the man you are becoming.\n\nAnd Ashley — once you have released the debt, you cannot take it back. You do not get to forgive and then unforgive when you feel hurt again. That is not biblical forgiveness. That is weaponized grace.`,
      exercise:"Both people write a statement of release — not for the other person's benefit, for their own before God. JP: 'I release Ashley from _____ because I have received God's forgiveness and I will not hold her to a standard higher than grace.' Ashley: 'I release JP from _____ not because it was acceptable but because God has forgiven him and I choose to operate from the same grace.' Read them to each other.",
      his:"JP — is there anything you need to ask Ashley's forgiveness for that you have explained rather than fully owned? Name it now without context.",
      hers:"Ashley — is there anything you need to ask JP's forgiveness for — the contempt, the weaponizing, the repeated prosecution of closed accounts? Name it now."
    }
  },
  {
    name:"Roles",
    theme:"What JP's leadership actually requires and what Ashley's submission actually means",
    mon:{
      title:"The Standard JP Is Held To",
      scripture:{text:"Husbands, love your wives, just as Christ loved the church and gave himself up for her.",ref:"Ephesians 5:25"},
      study:`Ephesians 5:25 is the most demanding instruction in all of scripture directed at a husband. The standard is not be a good provider, be kind, be faithful. The standard is: love her the way Christ loved the church. And Christ loved the church while it was broken, faithless, difficult, and actively failing him. He did not withdraw his leadership when the church disappointed him. He laid his life down.\n\nJP — you have been building toward this standard for a year and a half. The progress is real. But here is where it has broken down in practice: when Ashley has not responded to your growth the way you expected, you have escalated. You have broken a door. You have yelled. And in those moments you were not leading the way Christ leads the church. Christ absorbed the church's failure without becoming its enemy.\n\nSacrificial leadership means leading at a cost to yourself — not just when it feels good to lead, not just when she is responding well, but in the moments when you are most frustrated and most unappreciated. Those are the moments that define the leader.\n\nJP — you also need to understand that Ashley's resistance to your leadership has a specific history. It was formed in the period when your leadership was not trustworthy. The cheating, the drinking, the anger — those experiences taught her that following you was not safe. You are rebuilding the credibility of your leadership. That takes longer than you want it to and it requires more patience than feels fair. That is the cost of the original failures.`,
      exercise:"JP — study Ephesians 5:25-30 and write down every specific way Christ leads the church that you are being asked to replicate. Then write honestly: which of these am I currently doing and which am I failing at? Ashley — read JP's honest assessment. Do not correct it. Just receive it.",
      his:"JP — what does it look like in practical terms this week to love Ashley the way Christ loved the church — specifically in the moments when she is not making it easy?",
      hers:"Ashley — can you name one specific thing JP has done in the last month that looked like Christlike leadership? One thing that was genuinely sacrificial toward you?"
    },
    wed:{
      title:"The Standard Ashley Is Held To",
      scripture:{text:"The wise woman builds her house, but with her own hands the foolish one tears hers down.",ref:"Proverbs 14:1"},
      study:`Proverbs 14:1 is one of the most direct verses in scripture about a woman's role in the culture of her home. The wise woman builds. The foolish woman tears down — with her own hands, meaning through her own choices and patterns, not through what is done to her.\n\nAshley — this verse is not about your circumstances. It is about your choices within your circumstances. The contempt pattern, the silence, the weaponizing of past offenses, the reclusiveness, the emotional unavailability — these are not just responses to JP's failures. They are active choices that are tearing down what could still be built.\n\nProverbs 31 gives the full portrait of the woman of valor — eshet chayil. The same word used for mighty warriors. She is not passive. She is not diminished. She is fiercely active in building her home. She brings good and not harm all the days of her life — verse 12. She is not building when she feels like it or when her husband has earned it. She brings good all the days of her life.\n\n1 Peter 3:1-6 adds: a wife's godly conduct can win a husband without a word. The most powerful force available to Ashley right now is not a better argument or a better response to JP's messages. It is her lived, daily, genuine submission to God that transforms the atmosphere of this home.\n\nAshley — you are not called to be JP's subordinate. You are called to be his partner under God's design. That is a position of power, not weakness. The question is whether you will step into it.`,
      exercise:"Ashley — study Proverbs 31:10-31 and write down every specific quality of the woman of valor. Then write honestly: which of these am I currently living and which am I failing at? JP — read Ashley's honest assessment. Do not correct it or add to it. Just receive it.",
      his:"JP — where has your leadership created conditions that make it harder for Ashley to step into the role God designed for her? Name it specifically.",
      hers:"Ashley — what is one specific, visible way you can begin building rather than tearing down this week? Not a feeling — an action."
    },
    fri:{
      title:"Operating in Your Role as Unto God",
      scripture:{text:"Whatever you do, work at it with all your heart, as working for the Lord, not for human masters.",ref:"Colossians 3:23"},
      study:`Colossians 3:23 is JP's anchor verse and it applies to both of you in your respective roles with full force. Your role in this marriage is not performed for your spouse's approval or gratitude. It is performed as unto the Lord.\n\nJP — this means you lead sacrificially even when Ashley is not responding. Even when she shuts down. Even when she brings up the past. You lead as unto God because God is watching and God is the one you are ultimately accountable to. Your leadership is not contingent on her submission. Your faithfulness is not contingent on her gratitude.\n\nAshley — this means you build this home as unto God even when JP is not being the leader you need him to be. Even when you are still processing the wounds. Even when it does not feel fair. You operate in your role because God designed you for it and because God sees what it costs you and credits it accordingly.\n\nWhen both of you operate in your roles as unto the Lord the marriage stops being a performance for each other and starts being a covenant with God at the center. That is when it becomes unbreakable — not because both of you are perfect, but because both of you are accountable to someone greater than each other.`,
      exercise:"Both people write a commitment to God — not to each other, to God — about their specific role. JP: 'Lord, I commit to leading this family as _____, not when it is easy but as an act of obedience to you.' Ashley: 'Lord, I commit to building this home as _____, not when I feel like it but as an act of obedience to you.' Read them to each other as declarations before God.",
      his:"JP — what would it look like this week to lead in one specific sacrificial way that costs you something and that you do not expect credit for?",
      hers:"Ashley — what would it look like this week to build in one specific visible way that JP will notice — not to earn points but as an act of obedience to God?"
    }
  },
  {
    name:"Trust",
    theme:"Rebuilding specifically — the cheating, the stability, the safety",
    mon:{
      title:"What Was Broken and What Rebuilding Actually Takes",
      scripture:{text:"Let us not become weary in doing good, for at the proper time we will reap a harvest if we do not give up.",ref:"Galatians 6:9"},
      study:`The cheating broke three specific things in Ashley's trust: trust in JP's fidelity, trust in her own ability to read him, and trust in the security of the covenant itself. Those three things do not rebuild at the same rate and they do not rebuild through promises. They rebuild through the accumulation of consistent, observable evidence over time.\n\nTrust in JP's fidelity rebuilds through transparency, consistency, and the absence of the behaviors that enabled the infidelity. It cannot be demanded — it is earned.\n\nTrust in Ashley's ability to read JP rebuilds as JP becomes more legible — as his external behavior matches his internal state, as he is honest about his struggles rather than managing his image.\n\nTrust in the covenant itself rebuilds as both people demonstrate through sustained behavior that the covenant is the priority — above personal comfort, above being right, above self-protection.\n\nJP — you have been doing the work for a year and a half. That matters. The work you have done is real. But Ashley's trust timeline is not required to match your change timeline. Her trust rebuilds on the basis of the evidence as she experiences it — not as you believe she should experience it. Patience with her pace is itself evidence.`,
      exercise:"Both people answer privately: on a scale of 1 to 10, how much do I currently trust my spouse? Write the number. Write three specific, observable actions the other person could take in the next 30 days that would move your number up two points. Bring both to Wednesday.",
      his:"JP — have you been patient with the time trust takes to rebuild or have you communicated — directly or through frustration — that Ashley should be further along than she is?",
      hers:"Ashley — are you giving JP's changed behavior a genuine opportunity to register or are you unconsciously filtering new actions through the lens of old evidence?"
    },
    wed:{
      title:"The Specific Actions That Rebuild Trust",
      scripture:{text:"Commit your way to the Lord; trust in him and he will do this: He will make your righteous reward shine like the dawn.",ref:"Psalm 37:5-6"},
      study:`Psalm 37:5-6 is instruction for people who are doing right and not seeing results yet. Commit your way — galal in Hebrew, to roll — roll it onto God. Trust that the righteous harvest comes at the proper time, not your time.\n\nJP — here are the specific actions that rebuild trust with Ashley given the nature of the wounds:\n\nFor the cheating: full transparency without being asked. Accountability that is offered, not extracted. A life that is an open book — not because she demands it but because you understand what you asked her to forgive and you are willing to make it easy for her trust to grow.\n\nFor the drinking: demonstrating that the stability she needs is real and sustained. Not managing the appearance of stability — actually being stable. Being a man she can predict in the best sense.\n\nFor the anger: a sustained pattern of regulated responses — especially in the moments that would have previously produced escalation. Every time you de-escalate when you previously would have escalated, you are rebuilding her sense of safety.\n\nAshley — here are the specific actions that rebuild trust with JP:\n\nNaming concerns within 24 hours rather than carrying them silently until they become contempt. Acknowledging his growth verbally — not as praise but as honest recognition. Giving his changed behavior the benefit of the doubt in ambiguous situations rather than defaulting to suspicion.`,
      exercise:"Share the numbers and the three actions from Monday. These become your 30-day targets — written down, agreed upon, specific. Both people commit to the three actions the other person named. Check in on these in four weeks.",
      his:"JP — of the three trust-rebuilding actions for the cheating wound specifically, which one is hardest for you and why?",
      hers:"Ashley — of the three trust-extending actions, which one feels most risky and what would make it feel safer to attempt?"
    },
    fri:{
      title:"Trusting God With What Neither of You Can Control",
      scripture:{text:"And we know that in all things God works for the good of those who love him, who have been called according to his purpose.",ref:"Romans 8:28"},
      study:`Romans 8:28 is one of the most misquoted verses in scripture. People use it to mean everything works out fine. That is not what it says. It says God works all things — including the cheating, including the broken door, including the years of contempt and the years of prosecution — toward good for those who love him and are called according to his purpose.\n\nThe good is not comfort. The good is conformity to Christ — verse 29. God is using this marriage, this brokenness, this process, to make both JP and Ashley more like Christ. That is a painful process. It is also the most important one.\n\nNeither of you can control whether the other person comes fully through this process. JP cannot make Ashley trust him. Ashley cannot make JP lead perfectly. Both of you can only control your own faithfulness to God within your roles and trust that God is doing something in both of you that you cannot fully see yet.\n\nRomans 8:28 is the foundation under this entire process. Not JP's effort. Not Ashley's willingness. God's sovereign work in two people who have chosen to submit to it.`,
      exercise:"Together, pray Romans 8:28 over your marriage — each person personalizes it: 'Lord, I trust that you are working all of this — including _____ — toward good for us because we love you. I release the outcome to you.' Name the specific wound in the blank. Both pray it.",
      his:"JP — what outcome are you most trying to control in this marriage that you need to roll onto God?",
      hers:"Ashley — what outcome are you most trying to control in this marriage that you need to roll onto God?"
    }
  },
  {
    name:"Mission",
    theme:"What JP and Ashley and Avynn are actually building together",
    mon:{
      title:"Avynn Is Watching",
      scripture:{text:"These commandments that I give you today are to be on your hearts. Impress them on your children.",ref:"Deuteronomy 6:6-7"},
      study:`Avynn is two and a half years old. She cannot articulate what she is absorbing from this home but she is absorbing all of it. The tone of voice when her parents speak to each other. Whether repair happens after rupture. Whether there is peace or tension at the dinner table. Whether her father leads with gentleness or anger. Whether her mother builds or tears down.\n\nDeuteronomy 6 makes the home the primary discipleship environment. Not the church. Not the school. The home. What Avynn learns about God, about love, about what men do when they fail, about what women do when they are wounded, about whether broken things can be repaired — she learns it from watching JP and Ashley.\n\nJP — you took Avynn to church on Easter Sunday a year ago because you wanted something better for her. That impulse was from God. The mission of this family starts with that impulse. You saw that she deserved a father who is pursuing God. She also deserves to see what happens when two people who have broken each other choose to fight for the covenant rather than abandon it.\n\nAshley — Avynn is building her template for marriage from watching yours. The woman of valor in Proverbs 31 — her children rise and call her blessed (verse 28). That is the legacy available to you. It starts now, in this process, with the choices you make this week.`,
      exercise:"Both people write a letter to Avynn — to be read to her one day when she is old enough to receive it. Describe the home you are committed to building for her. What do you want her to know about faith, about what her father stood for, about what her mother chose? Do not share with each other yet.",
      his:"JP — what is Avynn currently learning about how a man responds when he is frustrated? And what do you want her to be able to say about her father when she is 25?",
      hers:"Ashley — what is Avynn currently learning about how a woman responds when she is wounded? And what do you want her to be able to say about her mother when she is 25?"
    },
    wed:{
      title:"The Family Mission",
      scripture:{text:"As for me and my house, we will serve the Lord.",ref:"Joshua 24:15"},
      study:`Joshua 24:15 is a declaration, not a wish. Joshua does not say he hopes his house serves the Lord or that he will try to get everyone on board. He declares the posture of his house and makes clear that his choice is made regardless of what others do.\n\nJP — you have been living this verse for a year and a half in your personal life. The mission of this family now needs to be declared jointly. Not as a performance. As a covenant commitment that both JP and Ashley make before God and before Avynn.\n\nA family without a declared mission drifts toward whatever is loudest — conflict, comfort, distraction. A family with a declared mission has a north star. When conflict comes — and it will come — the mission is what you return to. When the process gets hard — and it will get hard — the mission is the reason you stay in it.\n\nThe Campbell family mission is not generic. It is specific to who JP and Ashley are, what God has brought them through, and what they are building for Avynn. It should reflect the cheating and the healing. The anger and the growth. The wounds and the forgiveness. Because a family that has been through what you have been through and chosen to fight for it anyway has a testimony that is worth something.`,
      exercise:"Share the letters to Avynn. Pull out the common themes — what did both of you say you want for her? Those common themes become the raw material for your family mission statement. Draft it together: 'The Campbell family exists to...' Three sentences maximum. Read it out loud together when you finish.",
      his:"JP — does this mission statement reflect the man you are becoming or the man you used to be? Where does it need to be adjusted?",
      hers:"Ashley — does this mission statement reflect the woman you are becoming or the woman you have been hiding behind wounds? Where does it need to be adjusted?"
    },
    fri:{
      title:"Living the Mission in the Details",
      scripture:{text:"Start children off on the way they should go, and even when they are old they will not turn from it.",ref:"Proverbs 22:6"},
      study:`Proverbs 22:6 is about early formation. The word "start" in Hebrew is chanak — to dedicate, to initiate, to give the first taste. The first experiences create the frame that everything else is understood through.\n\nAvynn's first experiences of faith are being formed right now. Her first experience of what it looks like when a man repents and changes — JP. Her first experience of what it looks like when a woman chooses to build rather than tear down — Ashley. Her first experience of repair after rupture — whatever happens in this house this week.\n\nThe mission is not abstract. It is not a statement on a wall. It is the conversation at dinner. It is whether you pray together before she goes to bed. It is how JP speaks to Ashley when he is tired and frustrated. It is how Ashley responds to JP when she is still processing a wound. It is in every detail of every day.\n\nThe mission lives or dies in the details.`,
      exercise:"Read your family mission statement out loud as a family — with Avynn present, even at two and a half. The declaration matters. Then identify one specific, visible change in your home this week that reflects the mission. Put it in place before Sunday.",
      his:"JP — what is one specific detail of this week's daily life that you will change to reflect the mission for Avynn?",
      hers:"Ashley — what is one specific detail of this week's daily life that you will change to reflect the mission for Avynn?"
    }
  },
  {
    name:"Renewal",
    theme:"The honest accounting, the acknowledgment, and the covenant declared forward",
    mon:{
      title:"The Honest Inventory",
      scripture:{text:"Search me, God, and know my heart; test me and know my anxious thoughts. See if there is any offensive way in me, and lead me in the way everlasting.",ref:"Psalm 139:23-24"},
      study:`Psalm 139:23-24 is one of the most vulnerable prayers in scripture. David is not asking God to search his enemies. He is asking God to search him — to expose what is hidden, to name what is still offensive, to lead him out of whatever in him is not aligned with God.\n\nBefore this process closes, both JP and Ashley need a full honest inventory. Not of each other — of themselves. Eight weeks of study and exercise and reflection have surfaced things. What has God shown you about yourself? Not what has changed — what has God shown you?\n\nJP — what in you is still unsubmitted? The anger has been named. Has it been fully surrendered or just managed? The capacity for infidelity — the emptiness that was filled with sin — has it been addressed at the root or just suppressed through discipline? These are not accusations. They are the questions a man who takes Colossians 3:23 seriously asks himself.\n\nAshley — what in you is still unsubmitted? The contempt pattern has been named. Has it been released or just redirected? The wounds from the cheating — have they been brought to God for healing or are they being managed through this process without actually touching the deepest place? These are the questions a woman who takes Proverbs 14:1 seriously asks herself.`,
      exercise:"Both people write a full honest inventory — three columns: What shifted in me through this process. What I am still working on. What I need to acknowledge to my spouse before this closes. Take your time. Do not rush the last week.",
      his:"JP — what is the most significant thing God has shown you about yourself through this eight-week process?",
      hers:"Ashley — what is the most significant thing God has shown you about yourself through this eight-week process?"
    },
    wed:{
      title:"The Acknowledgment",
      scripture:{text:"Therefore confess your sins to each other and pray for each other so that you may be healed.",ref:"James 5:16"},
      study:`James 5:16 connects confession to healing. Not private confession — confession to each other. There is something that happens in the naming of a wound to another person that does not happen in private acknowledgment alone. The thing that stays hidden keeps its power. The thing named before another person and before God begins to lose it.\n\nThis session is the formal acknowledgment — JP and Ashley naming to each other what they contributed to the breakdown of this covenant. Not in exhaustive detail. Not as a performance. As a genuine, specific, honest admission.\n\nJP — you acknowledge the cheating, the drinking patterns, and the anger without explanation or context. You name what they cost Ashley. You do not follow the acknowledgment with what led to it or what you have done since. Just the truth of what it was and what it cost her.\n\nAshley — you acknowledge the contempt pattern, the weaponizing of repented offenses, the three-day silence cycles, and the spiritual unavailability. You name what they cost JP. You do not follow the acknowledgment with what led to it. Just the truth.\n\nBoth of these acknowledgments are received by the listener with one response: "I receive that. I forgive you. We are moving forward."`,
      exercise:"Share the third column of the inventories from Monday out loud. The listener receives it without rebuttal, without addition, without using it. After each acknowledgment: 'I receive that. I forgive you. We are moving forward.' Then pray together over what was just released.",
      his:"JP — what do you need to acknowledge to Ashley that you have explained rather than owned in every previous conversation about these things?",
      hers:"Ashley — what do you need to acknowledge to JP that you have justified rather than owned — the contempt, the prosecution, the spiritual resistance?"
    },
    fri:{
      title:"The Covenant Declared Forward",
      scripture:{text:"Being confident of this, that he who began a good work in you will carry it on to completion until the day of Christ Jesus.",ref:"Philippians 1:6"},
      study:`Philippians 1:6 is Paul's confidence — not in the Philippians, not in their circumstances, not in their track record. In the God who started the work. A God who initiates completes. The work God began in JP on Easter Sunday — he will carry it to completion. The work God is beginning in Ashley through this process — he will carry it to completion.\n\nThis eight-week process is not the end. It is the foundation. You have built a vocabulary, a set of laws, a mission, a framework for forgiveness, a posture of humility. What you have built requires maintenance. It requires returning to when you drift. It requires both people choosing it on the days when it does not feel worth it — which will come.\n\nBut here is what is also true: you chose each other. You chose this process. You chose to fight for something that would have been easier to abandon. JP — you drafted a manual for the woman who was making your life hard, because you believe the covenant is worth more than the pain. Ashley — you are reading a manual that names your failures directly, because somewhere underneath the wounds you believe it too.\n\nThat choosing is itself a declaration. And the God who began this work will see it through.`,
      exercise:"Both people write a letter to each other — one page — describing who they saw their spouse becoming through this eight-week process. Not who they were. Who they are becoming. Read them out loud to each other. Then pray together — JP leads — committing JP and Ashley and Avynn and this covenant to God. Out loud. Both voices.",
      his:"JP — who is the man you are committing to be for Ashley and Avynn going forward? Not in ideal conditions. In the hard ones.",
      hers:"Ashley — who is the woman you are committing to be for JP and Avynn going forward? Not in ideal conditions. In the hard ones."
    }
  }
];

let currentWeek=0, currentDay='mon', completedWeeks=[];

function startApp(){
  document.getElementById('cover').style.display='none';
  const app=document.getElementById('app');
  app.style.display='block';
  renderApp(app);
}

function renderApp(app){
  app.innerHTML=`
    <div class="top-nav">
      <button class="tnb active" onclick="switchTab('plan',this)">Lesson Plan</button>
      <button class="tnb" onclick="switchTab('foundation',this)">Foundation</button>
      <button class="tnb" onclick="switchTab('standards',this)">Standards</button>
      <button class="tnb" onclick="switchTab('commitments',this)">Commitments</button>
      <button class="tnb" onclick="switchTab('prayer',this)">Prayer</button>
    </div>
    <div id="panel-plan" class="panel active">${renderPlan()}</div>
    <div id="panel-foundation" class="panel">${renderFoundation()}</div>
    <div id="panel-standards" class="panel">${renderStandards()}</div>
    <div id="panel-commitments" class="panel">${renderCommitments()}</div>
    <div id="panel-prayer" class="panel">${renderPrayer()}</div>
  `;
}

function renderPlan(){
  const done=completedWeeks.length;
  const pct=Math.round((done/8)*100);
  return `
    <div class="sec-title">Eight-Week Plan</div>
    <div class="sec-sub">Monday · Wednesday · Friday · Church Sunday</div>
    <p class="body-text">Three sessions per week. Each session is written specifically to JP and Ashley — not generic marriage content. Show up on the scheduled day. Do not skip. Do not rush. The rhythm is the discipline.</p>
    <div class="progress-wrap">
      <div class="progress-top"><span>Progress</span><span>${done} of 8 weeks complete</span></div>
      <div class="progress-bar"><div class="progress-fill" id="pfill" style="width:${pct}%"></div></div>
    </div>
    <div class="week-grid" id="week-grid">${renderWeekGrid()}</div>
    <div id="lesson-area">${renderLesson()}</div>
  `;
}

function renderWeekGrid(){
  return WEEKS.map((w,i)=>`
    <div class="wk-btn ${i===currentWeek?'active':''} ${completedWeeks.includes(i)?'done':''}" onclick="selectWeek(${i})">
      <div class="wk-num">Week ${String(i+1).padStart(2,'0')}</div>
      <div class="wk-name">${w.name}</div>
      ${completedWeeks.includes(i)?'<div class="wk-check">✦ Complete</div>':''}
    </div>
  `).join('');
}

function renderLesson(){
  const w=WEEKS[currentWeek];
  const d=w[currentDay];
  return `
    <div class="divider"></div>
    <div class="sec-title">${w.name}</div>
    <div class="sec-sub">Week ${currentWeek+1} · ${w.theme}</div>
    <div class="day-tabs">
      <div class="day-tab ${currentDay==='mon'?'active':''}" onclick="selectDay('mon')"><div class="day-tab-label">Session 1</div><div class="day-tab-name">Monday</div></div>
      <div class="day-tab ${currentDay==='wed'?'active':''}" onclick="selectDay('wed')"><div class="day-tab-label">Session 2</div><div class="day-tab-name">Wednesday</div></div>
      <div class="day-tab ${currentDay==='fri'?'active':''}" onclick="selectDay('fri')"><div class="day-tab-label">Session 3</div><div class="day-tab-name">Friday</div></div>
      <div class="day-tab sun"><div class="day-tab-label">Rest</div><div class="day-tab-name">Sunday · Church</div></div>
    </div>
    <div class="ls"><div class="ls-label">Today's Study</div><div class="ls-body" style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--text);margin-bottom:4px;">${d.title}</div></div>
    <div class="scripture-block">${d.scripture.text}<cite>${d.scripture.ref}</cite></div>
    <div class="ls"><div class="ls-label">Deep Study</div><div class="ls-body">${d.study.replace(/\n/g,'<br><br>')}</div></div>
    <div class="gold-rule"></div>
    <div class="ls"><div class="ls-label">Exercise</div><div class="ls-body">${d.exercise.replace(/\n/g,'<br><br>')}</div></div>
    <div class="gold-rule"></div>
    <div class="ls"><div class="ls-label">Reflection</div>
      <div class="reflection-row">
        <div class="ref-box his"><div class="ref-box-label">JP</div><p>${d.his}</p></div>
        <div class="ref-box hers"><div class="ref-box-label">Ashley</div><p>${d.hers}</p></div>
      </div>
    </div>
    ${currentDay==='fri'?`<button class="complete-btn ${completedWeeks.includes(currentWeek)?'done':''}" onclick="markWeekDone()">${completedWeeks.includes(currentWeek)?'Week Complete ✦':'Mark Week '+(currentWeek+1)+' Complete'}</button>`:''}
  `;
}

function selectWeek(i){currentWeek=i;currentDay='mon';document.getElementById('panel-plan').innerHTML=renderPlan();}
function selectDay(d){currentDay=d;document.getElementById('panel-plan').innerHTML=renderPlan();}
function markWeekDone(){if(!completedWeeks.includes(currentWeek))completedWeeks.push(currentWeek);if(currentWeek<7)currentWeek++;currentDay='mon';document.getElementById('panel-plan').innerHTML=renderPlan();}
function switchTab(tab,btn){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tnb').forEach(b=>b.classList.remove('active'));document.getElementById('panel-'+tab).classList.add('active');btn.classList.add('active');}

function renderFoundation(){return `
  <div class="sec-title">The Foundation</div>
  <div class="sec-sub">What this process is built on — written for JP and Ashley specifically</div>
  <p class="body-text">This manual is not organized religion. It is not a therapy program. It is scripture applied directly to this covenant — to what JP confessed, to what Ashley experienced, to what both of them have built and destroyed and are choosing to rebuild. The standard throughout is the Word of God. Not either person's feelings. Not either person's version of fair.</p>
  <div class="pcard"><h3>God Is the Head of This House</h3><div class="vref">1 Corinthians 11:3 · Ephesians 5:21-25</div><p>The order is Christ over JP, JP over this household. This is not control — it is covering. JP has been building toward this for a year and a half. The covering only functions when JP is submitted to God first. When JP operates outside of submission to God, Ashley has historical reason not to trust the leadership. When JP operates inside submission to God, Ashley is being asked to trust God's design through him.</p></div>
  <div class="pcard"><h3>Surrender Before Strategy</h3><div class="vref">Proverbs 3:5-6</div><p>JP surrendered on Easter Sunday. That is the beginning of everything good that has happened since. Ashley's surrender is the work of this process. No framework, no lesson plan, no manual produces the results God can produce in a surrendered person. This entire document is secondary to what God does when two people genuinely kneel.</p></div>
  <div class="pcard"><h3>The Wounds Are Real and They Are Addressed Directly</h3><div class="vref">Psalm 147:3</div><p>The cheating, the drinking, the anger — this manual names them. Not to re-prosecute JP but to make forgiveness specific rather than general. General forgiveness does not fully release the wound. Specific forgiveness — naming what is being released — is what actually works. Ashley is not being asked to minimize what happened. She is being asked to release it to God.</p></div>
  <div class="pcard"><h3>No Outside Interference Required</h3><div class="vref">Joshua 24:15</div><p>The church is for worship and community. Therapy is a tool, not a requirement. This manual is designed to be sufficient — scripture, structure, and two people committed to the process. The question is not whether the tools are adequate. They are. The question is whether both people will use them faithfully, on schedule, without cutting corners.</p></div>
  <div class="pcard"><h3>Avynn Is the Mission</h3><div class="vref">Deuteronomy 6:6-7</div><p>Everything in this process is also for a two-and-a-half-year-old girl who is watching her parents decide whether love is something you fight for or something you abandon when it gets hard. JP took her to church on Easter Sunday because he wanted something better for her. This manual is what "something better" looks like built out into a structure.</p></div>
  <div class="seal"><p>As for me and my house, we will serve the Lord.</p><cite>Joshua 24:15</cite></div>
`;}

function renderStandards(){return `
  <div class="sec-title">Mutual Standards</div>
  <div class="sec-sub">Written specifically for JP and Ashley's patterns — non-negotiable</div>
  <p class="body-text">These are not generic communication tips. They are written directly to the specific breakdown patterns in this marriage. Both people have agreed to them. Both people hold each other accountable to them.</p>
  <div class="std-grid">
    <div class="std-col his"><h4>JP's Commitments</h4><ul>
      <li>No yelling — ever, under any provocation, under any amount of accumulated frustration</li>
      <li>No physical expressions of anger in this home — no broken anything</li>
      <li>Call the 15-minute pause before escalation — not after</li>
      <li>Initiate every session — do not wait for Ashley to start</li>
      <li>Full transparency without being asked — open book, not managed image</li>
      <li>Own failures without explanation — acknowledgment first, context never as the lead</li>
      <li>Pray over this family and over Ashley daily</li>
      <li>Patience with Ashley's trust timeline — it does not have to match his change timeline</li>
      <li>Continue personal development regardless of Ashley's pace</li>
    </ul></div>
    <div class="std-col hers"><h4>Ashley's Commitments</h4><ul>
      <li>No silent treatment beyond 24 hours — name the issue, schedule the conversation</li>
      <li>No weaponizing repented and changed offenses — the cheating, the drinking, the past anger are sealed</li>
      <li>Engage spiritual content every week — not optionally</li>
      <li>Name concerns same day — do not carry them until they become contempt</li>
      <li>Acknowledge JP's growth verbally — honest recognition, not performed praise</li>
      <li>Give his changed behavior the benefit of the doubt in ambiguous situations</li>
      <li>Pray over this family and over JP daily</li>
      <li>Active participation in every session — not as observer</li>
      <li>Pursue individual help — therapy, support, or spiritual mentor independently</li>
    </ul></div>
  </div>
  <div class="divider"></div>
  <div class="sec-title" style="font-size:24px;">The Four Laws</div>
  <div class="sec-sub">These govern every difficult conversation between JP and Ashley</div>
  <div class="pcard"><h3>Law 1 — The 24-Hour Rule</h3><div class="vref">Ephesians 4:26 — written primarily for Ashley</div><p>No issue sits more than 24 hours without being named. Not resolved — named. The three-day silence pattern is a direct violation of this law and it ends here. "I need to talk about something" must be said within 24 hours of an offense. The conversation can be scheduled for a better moment. It cannot be avoided or carried silently into contempt.</p></div>
  <div class="pcard"><h3>Law 2 — No Historical Prosecution</h3><div class="vref">Proverbs 17:9 · 1 Corinthians 13:5 — written primarily for Ashley</div><p>The cheating, the past drinking patterns, the previous anger incidents — any offense that has been repented of and changed is permanently off the table as ammunition. It cannot be introduced mid-conversation. It cannot be cited as evidence of current character. It is sealed. This is the hardest law and it is the most important one.</p></div>
  <div class="pcard"><h3>Law 3 — One Issue Per Conversation</h3><div class="vref">Matthew 5:37 — written for both</div><p>When a conversation begins on a current issue it stays on that issue. Ashley — the pattern of surfacing the real objection five minutes into a conversation that started somewhere else ends here. JP — when you initiate a conversation about connection or communication, stay on that topic and do not allow the conversation to be redirected without naming that it is happening.</p></div>
  <div class="pcard"><h3>Law 4 — The 15-Minute Pause</h3><div class="vref">Proverbs 15:1 — written primarily for JP</div><p>JP — this law is yours specifically. When you feel escalation coming — the heat rising, the urge to raise your voice, the physical tension that precedes the anger — you call a pause. Fifteen minutes. Walk outside. Breathe. Pray Psalm 46:10. Return. Every time you use this law instead of escalating you are rebuilding Ashley's sense of safety and you are becoming the man Colossians 3:23 demands.</p></div>
`;}

function renderCommitments(){return `
  <div class="sec-title">Covenant Commitments</div>
  <div class="sec-sub">The daily and weekly rhythm that carries this process</div>
  <div class="commit-card"><h3>Daily — Both JP and Ashley</h3>
    <div class="chk-row"><input type="checkbox" id="d1"><label for="d1">Personal prayer — 10 minutes minimum, alone before God, before the day touches either of you</label></div>
    <div class="chk-row"><input type="checkbox" id="d2"><label for="d2">One genuine acknowledgment or gratitude expressed toward your spouse — specific, not generic</label></div>
    <div class="chk-row"><input type="checkbox" id="d3"><label for="d3">24-hour clock check — is anything sitting unnamed that needs to be named today?</label></div>
    <div class="chk-row"><input type="checkbox" id="d4"><label for="d4">No unresolved offense carried past bedtime — name it, pray over it, or release it before sleep</label></div>
  </div>
  <div class="commit-card"><h3>Weekly — Together</h3>
    <div class="chk-row"><input type="checkbox" id="w1"><label for="w1">Monday session complete — both present, scripture read, study done, exercise completed</label></div>
    <div class="chk-row"><input type="checkbox" id="w2"><label for="w2">Wednesday session complete — depth engaged, exercise done, reflection questions answered honestly</label></div>
    <div class="chk-row"><input type="checkbox" id="w3"><label for="w3">Friday session complete — week sealed, declarations made, week marked done together</label></div>
    <div class="chk-row"><input type="checkbox" id="w4"><label for="w4">Sunday — church together as a family with Avynn</label></div>
    <div class="chk-row"><input type="checkbox" id="w5"><label for="w5">One dedicated time together — no phones, no agenda, fully present</label></div>
    <div class="chk-row"><input type="checkbox" id="w6"><label for="w6">Prayed together out loud at least once — JP leads</label></div>
  </div>
  <div class="commit-card"><h3>Ashley's Individual Track</h3>
    <div class="chk-row"><input type="checkbox" id="h1"><label for="h1">Pursued individual help this week — therapy session, support group, or spiritual mentor</label></div>
    <div class="chk-row"><input type="checkbox" id="h2"><label for="h2">Engaged spiritual content independently — sermon, teaching, or scripture study outside of sessions</label></div>
    <div class="chk-row"><input type="checkbox" id="h3"><label for="h3">Named at least one concern within 24 hours rather than carrying it into silence</label></div>
    <div class="chk-row"><input type="checkbox" id="h4"><label for="h4">Acknowledged one specific thing JP did this week that reflected his growth — said it out loud</label></div>
  </div>
  <div class="commit-card"><h3>JP's Individual Track</h3>
    <div class="chk-row"><input type="checkbox" id="j1"><label for="j1">Sentinel OPS discipline maintained — personal development did not pause for marriage difficulty</label></div>
    <div class="chk-row"><input type="checkbox" id="j2"><label for="j2">Initiated every session this week — did not wait for Ashley to start</label></div>
    <div class="chk-row"><input type="checkbox" id="j3"><label for="j3">Used the 15-minute pause at least once when escalation was coming — instead of escalating</label></div>
    <div class="chk-row"><input type="checkbox" id="j4"><label for="j4">One sacrificial act of leadership this week — something that cost him something and that he did not expect credit for</label></div>
  </div>
`;}

function renderPrayer(){return `
  <div class="sec-title">Prayer Framework</div>
  <div class="sec-sub">Written for JP and Ashley specifically</div>
  <p class="body-text">These prayers are not scripts. They are starting points. The specific wounds, the specific failures, the specific fears — those go in where the blanks are. Make these your own. The Holy Spirit intercedes where words fail — Romans 8:26.</p>
  <div class="pcard"><h3>JP's Daily Prayer</h3><div class="vref">Ephesians 5:25 · Colossians 3:23</div>
    <div class="scripture-block">Lord, make me the covering this family needs. I failed Ashley with the cheating and the anger and I know what that cost her. I cannot undo it. I can only become the man who does not repeat it — and I cannot become that man without you. Teach me to lead the way Christ loved the church — at a cost to myself, without guarantee of return. When Ashley is hard to love, make me slow to escalate and quick to cover. Let me rule my spirit before I try to lead this house. I am doing this as unto you. Colossians 3:23. Everything as unto you.<cite>— JP's daily posture prayer</cite></div>
  </div>
  <div class="pcard"><h3>Ashley's Daily Prayer</h3><div class="vref">Proverbs 14:1 · 1 Peter 3:4</div>
    <div class="scripture-block">Lord, I have been wounded and I have used the wound as a weapon and I know it. Soften what has hardened in me. Show me the difference between protecting myself and punishing JP for what he has already repented of. Teach me to build rather than tear down — even on the days when it does not feel safe to build. Heal the deepest wound — the one I have not shown anyone fully. Make me the woman, the wife, the mother you designed me to be. I cannot do it without you and I am choosing to stop trying.<cite>— Ashley's daily posture prayer</cite></div>
  </div>
  <div class="pcard"><h3>Together — Weekly Covenant Prayer</h3><div class="vref">Matthew 18:20 · Ecclesiastes 4:12</div>
    <div class="scripture-block">Lord, we are two people who have hurt each other in specific and serious ways. We are not coming to you with a clean record — we are coming to you because we do not have one. Do in this marriage what we cannot do in our own strength. Heal what the cheating broke. Heal what the anger broke. Heal what the contempt built. Give Avynn parents who showed her what repair looks like. We are submitting this covenant to you — JP and Ashley Campbell — as the only foundation strong enough to build on. Have your way in this house.<cite>— Weekly together prayer</cite></div>
  </div>
  <div class="divider"></div>
  <div class="sec-title" style="font-size:24px;">Anchor Verses</div>
  <div class="sec-sub">Return to these when the process gets hard</div>
  <div class="scripture-block">Whatever you do, work at it with all your heart, as working for the Lord, not for human masters.<cite>Colossians 3:23 — JP's anchor, applies to this marriage</cite></div>
  <div class="scripture-block">The wise woman builds her house, but with her own hands the foolish one tears hers down.<cite>Proverbs 14:1 — Ashley's daily standard</cite></div>
  <div class="scripture-block">Love is patient, love is kind. It does not envy, it does not boast, it is not proud. It does not dishonor others, it is not self-seeking, it is not easily angered, it keeps no record of wrongs.<cite>1 Corinthians 13:4-5 — the operating standard for both</cite></div>
  <div class="scripture-block">And we know that in all things God works for the good of those who love him, who have been called according to his purpose.<cite>Romans 8:28 — the foundation under all of it</cite></div>
  <div class="scripture-block">Being confident of this, that he who began a good work in you will carry it on to completion until the day of Christ Jesus.<cite>Philippians 1:6 — what this process rests on</cite></div>
  <div class="seal"><p>He who began a good work in you will carry it on to completion.</p><cite>Philippians 1:6</cite></div>
`;}
</script>
